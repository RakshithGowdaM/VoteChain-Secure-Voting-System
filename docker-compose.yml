version: '3.8'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: votechain-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: votechain
      MONGO_INITDB_ROOT_PASSWORD: votechain_pass
      MONGO_INITDB_DATABASE: votechain
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - votechain

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: votechain-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://votechain:votechain_pass@mongo:27017/votechain?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 2h
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-}
      FRONTEND_URL: http://localhost:3000
      ELECTION_NAME: ${ELECTION_NAME:-General Election 2025}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-votechain2025}
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - votechain
    volumes:
      - backend_logs:/app/logs

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
        REACT_APP_ELECTION_NAME: ${ELECTION_NAME:-General Election 2025}
        REACT_APP_BLOCKCHAIN_EXPLORER: https://etherscan.io/tx
    container_name: votechain-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - votechain

volumes:
  mongo_data:
  backend_logs:

networks:
  votechain:
    driver: bridge
